<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Notes App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="app-container">

    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-book"></i>
            <h2>My Notes</h2>
        </div>

        <div class="category-box">
            <input type="text" id="categoryInput" placeholder="New Category">
            <button onclick="addCategory()">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <ul id="categoryList"></ul>
    </aside>

    <main class="main-content">

        <div class="header">
            <h1>📝 Notes Dashboard</h1>
            <p>Create and organize your ideas beautifully.</p>
        </div>

        <div class="editor-card">

            <input type="text" id="title" placeholder="Enter note title">

            <input type="text" id="tags" placeholder="Tags (example: work,study,ideas)">

            <div class="toolbar">
                <button onclick="formatText('bold')">
                    <i class="fa-solid fa-bold"></i>
                </button>

                <button onclick="formatText('italic')">
                    <i class="fa-solid fa-italic"></i>
                </button>

                <button onclick="formatText('underline')">
                    <i class="fa-solid fa-underline"></i>
                </button>
            </div>

            <div id="editor" contenteditable="true">
                Start writing your note...
            </div>

            <button class="save-btn" onclick="saveNote()">
                Save Note
            </button>

        </div>

        <div class="notes-section">
            <h2>Your Notes</h2>
            <div id="notesContainer"></div>
        </div>

    </main>

</div>

<script src="app.js"></script>
</body>
</html>
